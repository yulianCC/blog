</script> </body> </html> <!-- 使用 define:vars 把后端的配置传给前端 JS --> <script>(function(){const pageSize = 4;

    document.addEventListener('DOMContentLoaded', async () => {
        // 获取 URL 中的查询参数
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        // 获取当前页码，默认为 1
        let currentPage = parseInt(urlParams.get('page') || '1', 10);
        
        const titleEl = document.getElementById('search-title');
        const resultsEl = document.getElementById('search-results');
        const paginationEl = document.getElementById('search-pagination');

        if (!query) {
            titleEl.textContent = '请输入搜索关键字';
            return;
        }

        try {
            // 请求全局 JSON 索引
            const response = await fetch('/search.json');
            const posts = await response.json();

            // 根据关键字过滤文章
            const lowerQuery = query.toLowerCase();
            const filteredPosts = posts.filter((post) => 
                post.title.toLowerCase().includes(lowerQuery) || 
                post.body.toLowerCase().includes(lowerQuery)
            );

            // 如果没有结果
            if (filteredPosts.length === 0) {
                titleEl.textContent = `包含关键字 "${query}" 的文章`;
                resultsEl.innerHTML = `
                    <article class="post">
                        <h2 class="post-title">没有找到内容</h2>
                    </article>
                `;
                return;
            }

            // --- 计算分页数据 ---
            const totalPosts = filteredPosts.length;
            const totalPages = Math.ceil(totalPosts / pageSize);

            // 页码越界处理
            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            titleEl.textContent = `包含关键字 "${query}" 的文章 (共 ${totalPosts} 篇)`;

            // 切割出当前页需要显示的数据
            const startIdx = (currentPage - 1) * pageSize;
            const endIdx = startIdx + pageSize;
            const paginatedPosts = filteredPosts.slice(startIdx, endIdx);

            // --- 渲染文章列表 ---
            let html = '';
            paginatedPosts.forEach((post) => {
                const date = new Date(post.date).toLocaleDateString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit'
                });
                
                // 高亮关键字函数
                function highlightKeyword(text) {
                    if (!query) return text;
                    const regex = new RegExp(`(${query})`, 'gi');
                    return text.replace(regex, '<mark>$1</mark>');
                }
                
                // 截取关键字前后的内容
                let excerpt = '';
                const lowerBody = post.body.toLowerCase();
                const lowerQuery = query.toLowerCase();
                const matchIndex = lowerBody.indexOf(lowerQuery);
                
                if (matchIndex !== -1) {
                    // 找到关键字，显示关键字前后各60个字符
                    const contextStart = Math.max(0, matchIndex - 60);
                    const contextEnd = Math.min(post.body.length, matchIndex + query.length + 60);
                    
                    let prefix = contextStart > 0 ? '...' : '';
                    let suffix = contextEnd < post.body.length ? '...' : '';
                    
                    excerpt = prefix + post.body.substring(contextStart, contextEnd) + suffix;
                } else {
                    // 没找到关键字，显示前150字
                    excerpt = post.body.length > 150 ? post.body.substring(0, 150) + '...' : post.body;
                }
                
                excerpt = highlightKeyword(excerpt);
                
                const highlightedTitle = highlightKeyword(post.title);
                
                html += `
                    <article class="post" itemscope itemtype="http://schema.org/BlogPosting">
                        <h2 class="post-title" itemprop="name headline">
                            <a itemprop="url" href="/post/${post.slug}">${highlightedTitle}</a>
                        </h2>
                        <ul class="post-meta">
                            <li>时间: <time datetime="${post.date}" itemprop="datePublished">${date}</time></li>
                            ${post.category ? `<li>分类: <a href="/category/${post.category}" itemprop="articleSection">${post.category}</a></li>` : ''}
                        </ul>
                        <div class="post-content" itemprop="articleBody">
                            <p>${excerpt}</p>
                        </div>
                    </article>
                `;
            });
            resultsEl.innerHTML = html;

            // --- 渲染翻页按钮 ---
            if (totalPages > 1) {
                let paginationHTML = '<ol class="page-navigator">';
                
                // 上一页
                if (currentPage > 1) {
                    paginationHTML += `<li class="prev"><a href="?q=${encodeURIComponent(query)}&page=${currentPage - 1}">&laquo; 前一页</a></li>`;
                }

                // 数字页码
                for (let i = 1; i <= totalPages; i++) {
                    if (i === currentPage) {
                        paginationHTML += `<li class="current"><a href="?q=${encodeURIComponent(query)}&page=${i}">${i}</a></li>`;
                    } else {
                        paginationHTML += `<li><a href="?q=${encodeURIComponent(query)}&page=${i}">${i}</a></li>`;
                    }
                }

                // 下一页
                if (currentPage < totalPages) {
                    paginationHTML += `<li class="next"><a href="?q=${encodeURIComponent(query)}&page=${currentPage + 1}">后一页 &raquo;</a></li>`;
                }

                paginationHTML += '</ol>';
                paginationEl.innerHTML = paginationHTML;
            }

        } catch (error) {
            console.error("搜索失败:", error);
            titleEl.textContent = '搜索出错，请稍后再试';
        }
    });
})();</script>
